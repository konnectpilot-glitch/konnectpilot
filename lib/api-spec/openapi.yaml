openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: PostPilot API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User management
  - name: brands
    description: Brand management
  - name: posts
    description: Post management
  - name: generate
    description: AI content generation
  - name: billing
    description: Stripe billing
  - name: dashboard
    description: Dashboard analytics
  - name: usage
    description: AI usage and quotas
  - name: admin
    description: Super-admin operations
  - name: affiliate
    description: Affiliate program tracking and payouts
  - name: analytics
    description: Performance analytics, AI insights, and growth recommendations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      security:
        - clerkAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateMe
      tags: [users]
      summary: Update current user profile
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /brands:
    get:
      operationId: listBrands
      tags: [brands]
      summary: List all brands for current user
      security:
        - clerkAuth: []
      responses:
        "200":
          description: List of brands
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Brand"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createBrand
      tags: [brands]
      summary: Create a new brand
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBrandBody"
      responses:
        "201":
          description: Created brand
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Brand"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Plan limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /brands/{id}:
    get:
      operationId: getBrand
      tags: [brands]
      summary: Get a specific brand
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Brand details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Brand"
        "404":
          description: Brand not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateBrand
      tags: [brands]
      summary: Update a brand
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBrandBody"
      responses:
        "200":
          description: Updated brand
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Brand"
        "404":
          description: Brand not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteBrand
      tags: [brands]
      summary: Delete a brand
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Brand deleted
        "404":
          description: Brand not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /posts:
    get:
      operationId: listPosts
      tags: [posts]
      summary: List all posts for current user
      security:
        - clerkAuth: []
      parameters:
        - name: brandId
          in: query
          schema:
            type: ["integer", "null"]
        - name: platform
          in: query
          schema:
            type: ["string", "null"]
        - name: status
          in: query
          schema:
            type: ["string", "null"]
        - name: limit
          in: query
          schema:
            type: ["integer", "null"]
        - name: offset
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: List of posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /posts/{id}:
    delete:
      operationId: deletePost
      tags: [posts]
      summary: Delete a post
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Post deleted
        "404":
          description: Post not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /generate:
    post:
      operationId: generatePost
      tags: [generate]
      summary: Generate AI post content
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeneratePostBody"
      responses:
        "200":
          description: Generated post content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedPost"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /generate/save:
    post:
      operationId: saveGeneratedPost
      tags: [generate]
      summary: Save a generated post to history
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SavePostBody"
      responses:
        "201":
          description: Saved post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /billing/plans:
    get:
      operationId: listPlans
      tags: [billing]
      summary: Get available subscription plans
      responses:
        "200":
          description: List of available plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Plan"

  /billing/checkout:
    post:
      operationId: createCheckoutSession
      tags: [billing]
      summary: Create a Stripe checkout session
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCheckoutBody"
      responses:
        "200":
          description: Checkout session URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSession"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /billing/portal:
    post:
      operationId: createPortalSession
      tags: [billing]
      summary: Create a Stripe billing portal session
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Portal session URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortalSession"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /billing/webhooks:
    post:
      operationId: handleStripeWebhook
      tags: [billing]
      summary: Handle Stripe webhook events
      responses:
        "200":
          description: Webhook handled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/recent-posts:
    get:
      operationId: getRecentPosts
      tags: [dashboard]
      summary: Get recent posts for dashboard
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Recent posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /usage/me:
    get:
      operationId: getMyUsage
      tags: [usage]
      summary: Get current user's monthly AI usage and limits
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Usage stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageStats"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: List all users (superadmin only)
      security:
        - clerkAuth: []
      responses:
        "200":
          description: List of users with summary metrics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUserSummary"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users/{id}/reset-trial:
    post:
      operationId: adminResetTrial
      tags: [admin]
      summary: Reset a user's 14-day trial
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserSummary"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users/{id}/plan:
    patch:
      operationId: adminSetPlan
      tags: [admin]
      summary: Change a user's plan
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminSetPlanBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserSummary"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users/{id}/impersonate:
    post:
      operationId: adminImpersonate
      tags: [admin]
      summary: Begin an impersonation session for the given user
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Impersonation session details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImpersonationSession"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users/{id}/superadmin:
    patch:
      operationId: adminSetSuperadmin
      tags: [admin]
      summary: Toggle superadmin flag on a user
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminSetSuperadminBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserSummary"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /affiliate/me:
    get:
      operationId: getAffiliateMe
      tags: [affiliate]
      summary: Get the current user's affiliate profile, stats, and balances
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Affiliate profile and stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AffiliateProfile"

  /affiliate/track-click:
    post:
      operationId: trackAffiliateClick
      tags: [affiliate]
      summary: Record a referral link click (public)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrackClickBody"
      responses:
        "200":
          description: Click recorded (or ignored if code unknown)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required: [ok]

  /affiliate/attribute-signup:
    post:
      operationId: attributeAffiliateSignup
      tags: [affiliate]
      summary: Attribute the current authenticated user to a referral code
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttributeSignupBody"
      responses:
        "200":
          description: Attribution result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  alreadyAttributed:
                    type: boolean
                required: [ok]
        "404":
          description: Unknown code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /affiliate/me/payout:
    patch:
      operationId: updateAffiliatePayout
      tags: [affiliate]
      summary: Update payout method and details for the current affiliate
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePayoutBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required: [ok]

  /admin/affiliates:
    get:
      operationId: adminListAffiliates
      tags: [admin]
      summary: List all affiliates with their pending/paid balances
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Affiliate list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminAffiliateSummary"

  /admin/affiliates/{id}/pay:
    post:
      operationId: adminPayAffiliate
      tags: [admin]
      summary: Mark all pending commissions for an affiliate as paid
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Payout summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  paidCents:
                    type: integer
                  commissionCount:
                    type: integer
                required: [ok, paidCents, commissionCount]

  /dashboard/platform-breakdown:
    get:
      operationId: getPlatformBreakdown
      tags: [dashboard]
      summary: Get post counts by platform
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Platform breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlatformStat"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /approval/generate-batch:
    post:
      summary: Pre-generate a batch of approval-queue posts for a brand
      description: |
        Generates `days` worth of pending_approval posts for the given brand
        across the requested platforms. Free/starter plans can request up to
        15 days; pro/agency/business up to 30. If the brand's `approvalMode`
        is `auto`, each post is also run through the AI second-pass and
        auto-approved/rejected.
      tags: [approval]
      security: [{ clerkAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateBatchBody"
      responses:
        "200":
          description: Batch result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateBatchResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "402":
          description: Plan limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /approval/posts/{id}:
    patch:
      summary: Edit a pending-approval post (caption, image, schedule)
      description: |
        Updating the caption logs an `edited` feedback event for the brand
        memory profile. Editor or admin role required.
      tags: [approval]
      security: [{ clerkAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EditApprovalPostBody"
      responses:
        "200":
          description: Updated post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /approval/bulk:
    post:
      summary: Apply a bulk action to many posts (approve, reject, reschedule, delete)
      tags: [approval]
      security: [{ clerkAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkApprovalBody"
      responses:
        "200":
          description: Bulk result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkApprovalResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /brands/{id}/memory:
    get:
      summary: Read the brand memory profile (learned style from feedback)
      tags: [approval]
      security: [{ clerkAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrandMemoryProfile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analytics/brands/{id}/summary:
    get:
      operationId: getAnalyticsSummary
      tags: [analytics]
      summary: Brand-level KPI summary with previous-period comparison
      security: [{ clerkAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: query
          name: range
          schema: { type: string, enum: ["7d", "30d", "90d"] }
        - in: query
          name: platform
          schema: { type: string }
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AnalyticsSummary" }

  /analytics/brands/{id}/timeseries:
    get:
      operationId: getAnalyticsTimeseries
      tags: [analytics]
      summary: Daily engagement and follower time series
      security: [{ clerkAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: query
          name: range
          schema: { type: string, enum: ["7d", "30d", "90d"] }
        - in: query
          name: platform
          schema: { type: string }
      responses:
        "200":
          description: Series
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AnalyticsTimeseries" }

  /analytics/brands/{id}/top-posts:
    get:
      operationId: getAnalyticsTopPosts
      tags: [analytics]
      summary: Best-performing posts ranked by engagement score
      security: [{ clerkAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: query
          name: range
          schema: { type: string }
        - in: query
          name: platform
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 50 }
      responses:
        "200":
          description: Top posts
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TopPost" }

  /analytics/posts/compare:
    get:
      operationId: compareAnalyticsPosts
      tags: [analytics]
      summary: Side-by-side metrics for two posts
      security: [{ clerkAuth: [] }]
      parameters:
        - in: query
          name: a
          required: true
          schema: { type: integer }
        - in: query
          name: b
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Comparison
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PostComparison" }

  /analytics/brands/{id}/recommendations:
    get:
      operationId: getAnalyticsRecommendations
      tags: [analytics]
      summary: Best posting hours, content types, hashtags, hooks
      security: [{ clerkAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Recommendations
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AnalyticsRecommendations" }

  /analytics/brands/{id}/insights:
    get:
      operationId: listAiInsights
      tags: [analytics]
      summary: List active AI insights for a brand
      security: [{ clerkAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Insights
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AiInsight" }

  /analytics/brands/{id}/insights/refresh:
    post:
      operationId: refreshAiInsights
      tags: [analytics]
      summary: Recompute Performance Memory and generate new AI insights
      security: [{ clerkAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  created: { type: integer }
                required: [created]

  /analytics/insights/{id}/dismiss:
    post:
      operationId: dismissAiInsight
      tags: [analytics]
      summary: Dismiss an AI insight
      security: [{ clerkAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                required: [ok]

  /analytics/insights/{id}/apply:
    post:
      operationId: applyAiInsight
      tags: [analytics]
      summary: Mark an AI insight as applied and return its action payload
      security: [{ clerkAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  payload: { type: ["object", "null"], additionalProperties: true }
                required: [ok]

  /analytics/brands/{id}/performance-memory:
    get:
      operationId: getPerformanceMemory
      tags: [analytics]
      summary: Distilled Performance Memory for a brand
      security: [{ clerkAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Performance memory
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PerformanceMemory" }

  /analytics/brands/{id}/reports:
    get:
      operationId: listAnalyticsReports
      tags: [analytics]
      summary: List analytics reports for a brand
      security: [{ clerkAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Reports
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AnalyticsReport" }
    post:
      operationId: generateAnalyticsReport
      tags: [analytics]
      summary: Generate a weekly or monthly performance report
      security: [{ clerkAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                period: { type: string, enum: [weekly, monthly] }
                emailOptIn: { type: boolean }
              required: [period]
      responses:
        "201":
          description: Report
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AnalyticsReport" }

  /analytics/brands/{id}/seo:
    post:
      operationId: generateAnalyticsSeo
      tags: [analytics]
      summary: Generate SEO recommendations for a blog draft, persisted as ai_insights
      security: [{ clerkAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SeoRecommendationsRequest" }
      responses:
        "200":
          description: SEO recommendations created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SeoRecommendationsResponse" }

components:
  securitySchemes:
    clerkAuth:
      type: http
      scheme: bearer

  schemas:
    AnalyticsSummary:
      type: object
      properties:
        brandId: { type: integer }
        range: { type: integer }
        platform: { type: ["string", "null"] }
        impressions: { type: integer }
        reach: { type: integer }
        likes: { type: integer }
        comments: { type: integer }
        shares: { type: integer }
        clicks: { type: integer }
        engagementRate: { type: number }
        ctr: { type: number, description: "Click-through rate = clicks / impressions" }
        prev:
          type: object
          properties:
            impressions: { type: integer }
            reach: { type: integer }
            likes: { type: integer }
            engagementRate: { type: number }
            ctr: { type: number }
          required: [impressions, reach, likes, engagementRate, ctr]
        followers:
          type: object
          properties:
            latest: { type: integer }
            min: { type: integer }
            max: { type: integer }
            delta: { type: integer }
          required: [latest, min, max, delta]
      required: [brandId, range, impressions, reach, likes, comments, shares, clicks, engagementRate, ctr, prev, followers]

    SeoRecommendationsRequest:
      type: object
      properties:
        topic: { type: string }
        draft: { type: string }

    SeoRecommendationsResponse:
      type: object
      properties:
        created: { type: integer }
      required: [created]

    AnalyticsTimeseries:
      type: object
      properties:
        range: { type: integer }
        platform: { type: ["string", "null"] }
        points:
          type: array
          items:
            type: object
            properties:
              day: { type: string }
              impressions: { type: integer }
              reach: { type: integer }
              likes: { type: integer }
              comments: { type: integer }
              shares: { type: integer }
              engagementRate: { type: number }
            required: [day, impressions, reach, likes, comments, shares, engagementRate]
        followers:
          type: array
          items:
            type: object
            properties:
              day: { type: string }
              followers: { type: integer }
            required: [day, followers]
      required: [range, points, followers]

    TopPost:
      type: object
      properties:
        postId: { type: integer }
        platform: { type: string }
        content: { type: string }
        imageUrl: { type: ["string", "null"] }
        publishedAt: { type: ["string", "null"] }
        score: { type: number }
        impressions: { type: integer }
        reach: { type: integer }
        likes: { type: integer }
        comments: { type: integer }
        shares: { type: integer }
        engagementRate: { type: number }
      required: [postId, platform, content, score, impressions, reach, likes, comments, shares, engagementRate]

    PostComparison:
      type: object
      properties:
        a:
          type: object
          properties:
            post: { type: object, additionalProperties: true }
            metrics: { type: ["object", "null"], additionalProperties: true }
          required: [post]
        b:
          type: object
          properties:
            post: { type: object, additionalProperties: true }
            metrics: { type: ["object", "null"], additionalProperties: true }
          required: [post]
      required: [a, b]

    AnalyticsRecommendations:
      type: object
      properties:
        bestHoursByPlatform:
          type: object
          additionalProperties:
            type: array
            items: { type: integer }
        bestContentTypesByPlatform:
          type: object
          additionalProperties:
            type: array
            items: { type: string }
        winningHashtags:
          type: array
          items: { type: string }
        winningHookTemplates:
          type: array
          items: { type: string }
      required: [bestHoursByPlatform, bestContentTypesByPlatform, winningHashtags, winningHookTemplates]

    AiInsight:
      type: object
      properties:
        id: { type: integer }
        brandId: { type: integer }
        postId: { type: ["integer", "null"] }
        kind: { type: string }
        severity: { type: string }
        title: { type: string }
        body: { type: string }
        payload: { type: ["object", "null"], additionalProperties: true }
        createdAt: { type: string }
        appliedAt: { type: ["string", "null"] }
      required: [id, brandId, kind, severity, title, body, createdAt]

    PerformanceMemory:
      type: object
      properties:
        brandId: { type: integer }
        topExemplars:
          type: array
          items:
            type: object
            properties:
              postId: { type: integer }
              platform: { type: string }
              content: { type: string }
              score: { type: number }
            required: [postId, platform, content, score]
        bestHoursByPlatform:
          type: object
          additionalProperties:
            type: array
            items: { type: integer }
        bestContentTypesByPlatform:
          type: object
          additionalProperties:
            type: array
            items: { type: string }
        winningHashtags:
          type: array
          items: { type: string }
        winningHookTemplates:
          type: array
          items: { type: string }
        distilledStrategy: { type: ["string", "null"] }
        samplesAnalyzed: { type: integer }
        lastDistilledAt: { type: ["string", "null"] }
        updatedAt: { type: string }
      required: [brandId, topExemplars, bestHoursByPlatform, bestContentTypesByPlatform, winningHashtags, winningHookTemplates, samplesAnalyzed, updatedAt]

    AnalyticsReport:
      type: object
      properties:
        id: { type: integer }
        brandId: { type: integer }
        period: { type: string }
        periodStart: { type: string }
        periodEnd: { type: string }
        summary: { type: object, additionalProperties: true }
        html: { type: string }
        createdAt: { type: string }
      required: [id, brandId, period, periodStart, periodEnd, summary, createdAt]

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    User:
      type: object
