kind = "web"
previewPath = "/"
title = "KonnectPilot"
version = "1.0.0"
id = "artifacts/postpilot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25960

[services.development]
run = "pnpm --filter @workspace/postpilot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/postpilot", "run", "build" ]
publicDir = "artifacts/postpilot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25960"
BASE_PATH = "/"
